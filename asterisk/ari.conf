; ============================================================
; /etc/asterisk/ari.conf — ai powered voice based 24.7 booking system ARI Configuration
; SECURITY: Change password before deploying!
; ============================================================

[general]
enabled = yes
websocket_enabled = yes
websocket_write_timeout = 100
allowed_origins = 127.0.0.1,localhost
pretty = no
auth_realm = Asterisk REST Interface

; ── ARI User ─────────────────────────────────────────────────────────────
; Password set from env: ASTERISK_ARI_PASSWORD
; Change this to match your .env value
[asterisk]
type = user
read_only = no
password = CHANGE_ME_TO_MATCH_ENV

; ============================================================
; /etc/asterisk/pjsip.conf — ai powered voice based 24.7 booking system SIP Config
; Basic setup for softphone testing
; ============================================================

[global]
max_initial_qualify_time = 4

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

; ── Test endpoint (softphone for demo) ───────────────────────────────────
[demo-phone]
type = endpoint
context = booking-system
disallow = all
allow = ulaw
allow = alaw
auth = demo-phone
aors = demo-phone

[demo-phone]
type = auth
auth_type = userpass
password = demo1234
username = demo-phone

[demo-phone]
type = aor
max_contacts = 1
remove_existing = yes

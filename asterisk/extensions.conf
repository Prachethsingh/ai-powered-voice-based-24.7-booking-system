; ============================================================
; /etc/asterisk/extensions.conf — ai powered voice based 24.7 booking system
; All incoming calls routed to ARI Stasis app
; ============================================================

[general]
static=yes
writeprotect=no
clearglobalvars=no

; ── Booking System app ─────────────────────────────────────────────────────────
[booking-system]
; Route ALL incoming calls to ARI application
exten => _.,1,NoOp(ai powered voice based 24.7 booking system: Incoming call from ${CALLERID(num)})
 same  => n,Stasis(booking-system)
 same  => n,Hangup()

; Default extension if Stasis returns
exten => s,1,Stasis(booking-system)
 same  => n,Hangup()

; ── from-pstn (SIP trunk) ─────────────────────────────────────────────────
[from-pstn]
exten => _.,1,Goto(booking-system,${EXTEN},1)

; ── from-internal (testing) ───────────────────────────────────────────────
[from-internal]
exten => 100,1,Stasis(booking-system)
 same  => n,Hangup()
